<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="nightsky" cx="50%" cy="0%" r="100%">
      <stop offset="0" stop-color="#11193a"/>
      <stop offset="0.55" stop-color="#0a0e24"/>
      <stop offset="1" stop-color="#04050f"/>
    </radialGradient>
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff7dc" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#fff7dc" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#fff7dc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebV" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0a6fb0" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#0a6fb0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebB" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00a3e0" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#00a3e0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#nightsky)"/>

  <!-- nebulae -->
  <ellipse cx="320" cy="320" rx="520" ry="420" fill="url(#nebV)"/>
  <ellipse cx="1240" cy="540" rx="460" ry="380" fill="url(#nebB)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="180" cy="140" r="2.2" opacity="0.9"/>
    <circle cx="420" cy="90" r="1.6" opacity="0.7"/>
    <circle cx="640" cy="180" r="2.4" opacity="0.85"/>
    <circle cx="900" cy="120" r="1.4" opacity="0.6"/>
    <circle cx="1080" cy="220" r="2" opacity="0.8"/>
    <circle cx="1380" cy="160" r="1.8" opacity="0.75"/>
    <circle cx="260" cy="420" r="1.5" opacity="0.6"/>
    <circle cx="520" cy="360" r="2.1" opacity="0.85"/>
    <circle cx="760" cy="300" r="1.3" opacity="0.55"/>
    <circle cx="1180" cy="380" r="1.7" opacity="0.7"/>
    <circle cx="1460" cy="420" r="2" opacity="0.8"/>
    <circle cx="340" cy="560" r="1.4" opacity="0.55"/>
  </g>

</svg>
