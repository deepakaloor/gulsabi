<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0288D1"/>
      <stop offset="60%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <radialGradient id="sun5" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFF59D"/>
      <stop offset="70%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
    <linearGradient id="img5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
  </defs>
  <rect width="380" height="220" fill="url(#sky5)"/>
  <!-- sun -->
  <circle cx="345" cy="38" r="22" fill="url(#sun5)" opacity="0.75"/>
  <!-- cloud -->
  <g fill="white" opacity="0.78">
    <ellipse cx="50" cy="40" rx="24" ry="8"/>
    <circle cx="38" cy="35" r="11"/>
    <circle cx="54" cy="30" r="13"/>
    <circle cx="68" cy="35" r="10"/>
  </g>
  <!-- big yellow question mark behind the card (decorative) -->
  <text x="320" y="155" font-family="'Trebuchet MS', sans-serif" font-size="100" font-weight="900" fill="#FFD600" opacity="0.35">?</text>
  <text x="40" y="200" font-family="'Trebuchet MS', sans-serif" font-size="70" font-weight="900" fill="#FFD600" opacity="0.3">?</text>
  <!-- centered quiz "card" with image inside -->
  <g transform="translate(125, 105)">
    <!-- image frame -->
    <rect x="-46" y="-46" width="92" height="92" rx="14" fill="white" stroke="#FFD600" stroke-width="5"/>
    <rect x="-40" y="-40" width="80" height="80" rx="9" fill="url(#img5)"/>
    <!-- apple in the frame -->
    <circle cx="0" cy="6" r="24" fill="#FF5252" stroke="#B71C1C" stroke-width="2.5"/>
    <ellipse cx="-8" cy="-2" rx="6" ry="4" fill="#FFCDD2" opacity="0.7"/>
    <rect x="-2" y="-20" width="4" height="7" fill="#6D4C41" rx="1"/>
    <path d="M 2 -20 Q 10 -27 14 -20" stroke="#558B2F" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- 2x2 answer-option chips on the right -->
  <g font-family="'Trebuchet MS', sans-serif" font-size="13" font-weight="900">
    <!-- correct: Apple (highlighted green) -->
    <g transform="translate(265, 70)">
      <rect x="-44" y="-15" width="88" height="30" rx="14" fill="#2DC572" stroke="white" stroke-width="3"/>
      <text x="0" y="5" text-anchor="middle" fill="white">Apple</text>
      <circle cx="34" cy="-10" r="7" fill="white"/>
      <path d="M 31 -10 L 33 -8 L 38 -13" stroke="#2DC572" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Banana -->
    <g transform="translate(265, 110)">
      <rect x="-44" y="-15" width="88" height="30" rx="14" fill="white" stroke="#0288D1" stroke-width="3"/>
      <text x="0" y="5" text-anchor="middle" fill="#2c3e50">Banana</text>
    </g>
    <!-- Tomato -->
    <g transform="translate(265, 150)">
      <rect x="-44" y="-15" width="88" height="30" rx="14" fill="white" stroke="#0288D1" stroke-width="3"/>
      <text x="0" y="5" text-anchor="middle" fill="#2c3e50">Tomato</text>
    </g>
    <!-- Cherry -->
    <g transform="translate(265, 190)">
      <rect x="-44" y="-15" width="88" height="30" rx="14" fill="white" stroke="#0288D1" stroke-width="3"/>
      <text x="0" y="5" text-anchor="middle" fill="#2c3e50">Peach</text>
    </g>
  </g>
  <!-- sparkles -->
  <g fill="#FFD600">
    <polygon points="190,35 192,41 198,41 193,45 195,51 190,47 185,51 187,45 182,41 188,41"/>
    <polygon points="120,200 121,203 124,203 122,205 123,208 120,206 117,208 118,205 116,203 119,203"/>
  </g>
</svg>
