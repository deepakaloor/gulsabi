<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyG1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="35%" stop-color="#1565C0"/>
      <stop offset="70%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <radialGradient id="sun1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="50%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="boom1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="60%" stop-color="#FF5722" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF5722" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sunset sky -->
  <rect width="380" height="220" fill="url(#skyG1)"/>

  <!-- distant stars -->
  <g fill="white" opacity="0.95">
    <circle cx="40" cy="22" r="1.6"/>
    <circle cx="110" cy="12" r="1.2"/>
    <circle cx="190" cy="28" r="1"/>
    <circle cx="265" cy="14" r="1.5"/>
    <circle cx="340" cy="35" r="1.2"/>
    <circle cx="78" cy="48" r="0.9"/>
  </g>

  <!-- big sun glow halo -->
  <circle cx="80" cy="170" r="80" fill="url(#sun1)" opacity="0.55"/>
  <!-- sun disc -->
  <circle cx="80" cy="170" r="34" fill="#FFD600" stroke="#FF8F00" stroke-width="3"/>

  <!-- thin cloud silhouettes against sunset -->
  <g fill="#2c3e50" opacity="0.35">
    <ellipse cx="305" cy="80" rx="55" ry="6"/>
    <ellipse cx="240" cy="100" rx="40" ry="4"/>
  </g>

  <!-- exploding asteroid behind/right -->
  <g transform="translate(305, 140)">
    <circle cx="0" cy="0" r="38" fill="url(#boom1)"/>
    <g transform="rotate(-12)">
      <circle cx="0" cy="0" r="16" fill="#8D6E63" stroke="#3E2723" stroke-width="2.5"/>
      <circle cx="-5" cy="-3" r="3" fill="#5D4037"/>
      <circle cx="4" cy="3" r="2.5" fill="#5D4037"/>
    </g>
    <!-- debris -->
    <g fill="#5D4037" stroke="#3E2723" stroke-width="1.2">
      <polygon points="22,-18 27,-14 23,-9 18,-13"/>
      <polygon points="-25,-15 -20,-12 -23,-7 -28,-10"/>
      <polygon points="18,18 23,21 19,26 14,23"/>
    </g>
    <!-- spark stars -->
    <g fill="#FFEB3B">
      <polygon points="30,-25 33,-19 39,-19 34,-15 36,-9 30,-13 24,-9 26,-15 21,-19 27,-19"/>
      <polygon points="-30,18 -27,22 -22,22 -25,25 -23,30 -30,27 -36,30 -34,25 -38,22 -33,22"/>
    </g>
  </g>

  <!-- flying Gulsabi (big, dynamic) -->
  <g transform="translate(150, 110) rotate(-12)">
    <!-- speed lines behind -->
    <g stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <line x1="-72" y1="-22" x2="-46" y2="-16"/>
      <line x1="-80" y1="-4" x2="-50" y2="0"/>
      <line x1="-78" y1="14" x2="-50" y2="14"/>
      <line x1="-68" y1="28" x2="-44" y2="22"/>
    </g>
    <!-- cape billowing back -->
    <path d="M -32 -8 Q -62 8 -52 38 Q -36 34 -20 22 Z" fill="#FF4F4F" stroke="#C44545" stroke-width="3"/>
    <path d="M -28 -2 Q -50 16 -42 34" stroke="#C44545" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- body -->
    <circle cx="0" cy="0" r="36" fill="#FFD600" stroke="#2c3e50" stroke-width="4"/>
    <!-- cheeks -->
    <ellipse cx="-15" cy="9" rx="6" ry="4.5" fill="#FF8A80" opacity="0.7"/>
    <ellipse cx="15" cy="9" rx="6" ry="4.5" fill="#FF8A80" opacity="0.7"/>
    <!-- eyes (excited big) -->
    <circle cx="-11" cy="-6" r="5.5" fill="#2c3e50"/>
    <circle cx="11" cy="-6" r="5.5" fill="#2c3e50"/>
    <circle cx="-9" cy="-8" r="2" fill="white"/>
    <circle cx="13" cy="-8" r="2" fill="white"/>
    <!-- big open smile (action mode!) -->
    <path d="M -12 6 Q 0 20 12 6" stroke="#2c3e50" stroke-width="4" fill="#3E2723" stroke-linejoin="round"/>
    <path d="M -12 6 Q 0 14 12 6" fill="#FF8A80"/>
  </g>

  <!-- glowing coin power-up bottom-left -->
  <g transform="translate(50, 80)">
    <circle cx="0" cy="0" r="14" fill="#FFD600" stroke="#FF8F00" stroke-width="3"/>
    <text x="0" y="5" font-family="'Fredoka One', Fredoka, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF6F00">$</text>
    <g fill="white" opacity="0.85">
      <circle cx="-4" cy="-5" r="2"/>
    </g>
  </g>

  <!-- sparkle accents -->
  <g fill="white" opacity="0.95">
    <polygon points="225,32 228,40 236,40 230,45 233,53 225,48 217,53 220,45 214,40 222,40"/>
    <polygon points="350,160 352,165 357,165 353,168 355,173 350,170 345,173 347,168 343,165 348,165"/>
  </g>
</svg>
