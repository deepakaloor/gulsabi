<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <radialGradient id="spot3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFEB3B" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#FFD600" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFD600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- bold purple→pink background -->
  <rect width="380" height="220" fill="url(#bg3)"/>

  <!-- subtle dot pattern (visual texture) -->
  <g fill="white" opacity="0.07">
    <circle cx="30" cy="30" r="3"/>
    <circle cx="80" cy="60" r="2"/>
    <circle cx="350" cy="40" r="2.5"/>
    <circle cx="320" cy="180" r="3"/>
    <circle cx="20" cy="170" r="2"/>
    <circle cx="200" cy="200" r="2.5"/>
  </g>

  <!-- spotlight glow on the odd one -->
  <circle cx="252" cy="108" r="68" fill="url(#spot3)"/>

  <!-- 3x3 grid of leaves (centered around 190,110) -->
  <!-- column positions x: 110, 190, 270; row y: 50, 110, 170 -->

  <!-- helper leaf shape (green) -->
  <g id="leafGreen" />

  <!-- 8 green leaves + 1 purple (centerish) -->
  <!-- (110,50) -->
  <g transform="translate(110, 50) rotate(-20)">
    <path d="M 0 -22 Q 22 -22 22 0 Q 22 22 0 22 Q -22 22 -22 0 Q -22 -22 0 -22 Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="2.5"/>
    <path d="M 0 -22 Q 6 0 0 22" stroke="#1B5E20" stroke-width="1.5" fill="none"/>
  </g>
  <!-- (190,50) -->
  <g transform="translate(190, 50) rotate(8)">
    <path d="M 0 -22 Q 22 -22 22 0 Q 22 22 0 22 Q -22 22 -22 0 Q -22 -22 0 -22 Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="2.5"/>
    <path d="M 0 -22 Q 6 0 0 22" stroke="#1B5E20" stroke-width="1.5" fill="none"/>
  </g>
  <!-- (270,50) -->
  <g transform="translate(270, 50) rotate(-15)">
    <path d="M 0 -22 Q 22 -22 22 0 Q 22 22 0 22 Q -22 22 -22 0 Q -22 -22 0 -22 Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="2.5"/>
    <path d="M 0 -22 Q 6 0 0 22" stroke="#1B5E20" stroke-width="1.5" fill="none"/>
  </g>
  <!-- (110,110) -->
  <g transform="translate(110, 110) rotate(12)">
    <path d="M 0 -22 Q 22 -22 22 0 Q 22 22 0 22 Q -22 22 -22 0 Q -22 -22 0 -22 Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="2.5"/>
    <path d="M 0 -22 Q 6 0 0 22" stroke="#1B5E20" stroke-width="1.5" fill="none"/>
  </g>
  <!-- (190,110) center green -->
  <g transform="translate(190, 110) rotate(-5)">
    <path d="M 0 -22 Q 22 -22 22 0 Q 22 22 0 22 Q -22 22 -22 0 Q -22 -22 0 -22 Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="2.5"/>
    <path d="M 0 -22 Q 6 0 0 22" stroke="#1B5E20" stroke-width="1.5" fill="none"/>
  </g>
  <!-- (270,110) PURPLE — the odd one -->
  <g transform="translate(270, 110) rotate(8)">
    <!-- pulsing accent ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FFD600" stroke-width="3" stroke-dasharray="3 3" opacity="0.95"/>
    <path d="M 0 -22 Q 22 -22 22 0 Q 22 22 0 22 Q -22 22 -22 0 Q -22 -22 0 -22 Z" fill="#9C27B0" stroke="#4A148C" stroke-width="2.5"/>
    <path d="M 0 -22 Q 6 0 0 22" stroke="#4A148C" stroke-width="1.5" fill="none"/>
  </g>
  <!-- (110,170) -->
  <g transform="translate(110, 170) rotate(-8)">
    <path d="M 0 -22 Q 22 -22 22 0 Q 22 22 0 22 Q -22 22 -22 0 Q -22 -22 0 -22 Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="2.5"/>
    <path d="M 0 -22 Q 6 0 0 22" stroke="#1B5E20" stroke-width="1.5" fill="none"/>
  </g>
  <!-- (190,170) -->
  <g transform="translate(190, 170) rotate(15)">
    <path d="M 0 -22 Q 22 -22 22 0 Q 22 22 0 22 Q -22 22 -22 0 Q -22 -22 0 -22 Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="2.5"/>
    <path d="M 0 -22 Q 6 0 0 22" stroke="#1B5E20" stroke-width="1.5" fill="none"/>
  </g>
  <!-- (270,170) -->
  <g transform="translate(270, 170) rotate(-20)">
    <path d="M 0 -22 Q 22 -22 22 0 Q 22 22 0 22 Q -22 22 -22 0 Q -22 -22 0 -22 Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="2.5"/>
    <path d="M 0 -22 Q 6 0 0 22" stroke="#1B5E20" stroke-width="1.5" fill="none"/>
  </g>

  <!-- big magnifying glass over the purple leaf -->
  <g transform="translate(305, 78)" stroke-linecap="round">
    <!-- handle -->
    <line x1="0" y1="0" x2="-26" y2="26" stroke="#3E2723" stroke-width="11"/>
    <line x1="0" y1="0" x2="-26" y2="26" stroke="#8D6E63" stroke-width="7"/>
    <!-- lens ring -->
    <circle cx="0" cy="-12" r="32" fill="white" opacity="0.25" stroke="#2c3e50" stroke-width="6"/>
    <!-- lens highlight -->
    <path d="M -15 -25 Q -22 -15 -16 -5" stroke="white" stroke-width="3" fill="none" opacity="0.9"/>
  </g>

  <!-- Gulsabi peeking from bottom-left -->
  <g transform="translate(50, 175)">
    <!-- thinking pose: head tilted -->
    <g transform="rotate(-8)">
      <circle cx="0" cy="0" r="28" fill="#FFD600" stroke="#2c3e50" stroke-width="3.5"/>
      <ellipse cx="-12" cy="6" rx="4.5" ry="3.5" fill="#FF8A80" opacity="0.7"/>
      <ellipse cx="12" cy="6" rx="4.5" ry="3.5" fill="#FF8A80" opacity="0.7"/>
      <circle cx="-9" cy="-4" r="4.5" fill="#2c3e50"/>
      <circle cx="9" cy="-4" r="4.5" fill="#2c3e50"/>
      <circle cx="-7" cy="-6" r="1.6" fill="white"/>
      <circle cx="11" cy="-6" r="1.6" fill="white"/>
      <!-- "thinking" small open mouth -->
      <ellipse cx="0" cy="7" rx="3.5" ry="2.5" fill="#3E2723"/>
    </g>
    <!-- thought bubble -->
    <circle cx="28" cy="-22" r="3" fill="white" opacity="0.9"/>
    <circle cx="36" cy="-30" r="4.5" fill="white" opacity="0.9"/>
  </g>

  <!-- sparkles -->
  <g fill="#FFD600">
    <polygon points="320,170 322,176 328,176 323,180 325,186 320,182 315,186 317,180 312,176 318,176"/>
    <polygon points="170,30 172,35 177,35 173,38 175,43 170,40 165,43 167,38 163,35 168,35"/>
  </g>
</svg>
