<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#006064"/>
      <stop offset="100%" stop-color="#311B92"/>
    </linearGradient>
    <linearGradient id="cardBack4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </linearGradient>
    <radialGradient id="matchGlow4" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#FFEB3B" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#FFD600" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- teal→purple "card table" background -->
  <rect width="380" height="220" fill="url(#bg4)"/>

  <!-- subtle table pattern -->
  <g fill="white" opacity="0.04">
    <polygon points="20,40 30,30 40,40 30,50"/>
    <polygon points="340,30 350,20 360,30 350,40"/>
    <polygon points="80,200 90,190 100,200 90,210"/>
    <polygon points="300,190 310,180 320,190 310,200"/>
  </g>

  <!-- match glow behind the matched pair -->
  <circle cx="180" cy="115" r="100" fill="url(#matchGlow4)"/>

  <!-- fan of cards: back row (face-down) -->
  <!-- card far left face-down -->
  <g transform="translate(50, 115) rotate(-18)">
    <rect x="-26" y="-38" width="52" height="76" rx="8" fill="url(#cardBack4)" stroke="#2c3e50" stroke-width="3"/>
    <text x="0" y="6" font-family="'Fredoka One', Fredoka, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="white" opacity="0.9">?</text>
  </g>

  <!-- card far right face-down -->
  <g transform="translate(330, 115) rotate(18)">
    <rect x="-26" y="-38" width="52" height="76" rx="8" fill="url(#cardBack4)" stroke="#2c3e50" stroke-width="3"/>
    <text x="0" y="6" font-family="'Fredoka One', Fredoka, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="white" opacity="0.9">?</text>
  </g>

  <!-- middle row: matched pair revealed -->
  <!-- left match card (apple) -->
  <g transform="translate(150, 115) rotate(-6)">
    <rect x="-28" y="-40" width="56" height="80" rx="10" fill="white" stroke="#2DC572" stroke-width="4"/>
    <!-- apple icon -->
    <g transform="translate(0,2)">
      <path d="M -14 -2 Q -15 -14 -5 -14 Q 0 -18 5 -14 Q 15 -14 14 -2 Q 15 12 5 14 Q 0 16 -5 14 Q -15 12 -14 -2 Z" fill="#F44336" stroke="#B71C1C" stroke-width="2"/>
      <path d="M 0 -18 Q 5 -23 10 -20 Q 9 -15 3 -14" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5"/>
    </g>
    <!-- match check badge -->
    <circle cx="20" cy="-30" r="9" fill="#2DC572" stroke="#2c3e50" stroke-width="2"/>
    <path d="M 16 -30 L 19 -27 L 24 -33" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- right match card (apple again) -->
  <g transform="translate(230, 115) rotate(6)">
    <rect x="-28" y="-40" width="56" height="80" rx="10" fill="white" stroke="#2DC572" stroke-width="4"/>
    <g transform="translate(0,2)">
      <path d="M -14 -2 Q -15 -14 -5 -14 Q 0 -18 5 -14 Q 15 -14 14 -2 Q 15 12 5 14 Q 0 16 -5 14 Q -15 12 -14 -2 Z" fill="#F44336" stroke="#B71C1C" stroke-width="2"/>
      <path d="M 0 -18 Q 5 -23 10 -20 Q 9 -15 3 -14" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5"/>
    </g>
    <circle cx="-20" cy="-30" r="9" fill="#2DC572" stroke="#2c3e50" stroke-width="2"/>
    <path d="M -24 -30 L -21 -27 L -16 -33" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- MATCH! burst behind the cards -->
  <g transform="translate(190, 38)">
    <polygon points="-46,0 -32,-7 -22,-2 -10,-12 0,-4 10,-12 22,-2 32,-7 46,0 32,7 22,2 10,12 0,4 -10,12 -22,2 -32,7" fill="#FFD600" stroke="#2c3e50" stroke-width="2.5"/>
    <text x="0" y="5" font-family="'Fredoka One', Fredoka, sans-serif" font-size="14" font-weight="900" text-anchor="middle" fill="#FF4F4F" stroke="#2c3e50" stroke-width="0.4">MATCH!</text>
  </g>

  <!-- Gulsabi peeking from corner -->
  <g transform="translate(330, 195)">
    <circle cx="0" cy="0" r="22" fill="#FFD600" stroke="#2c3e50" stroke-width="3"/>
    <circle cx="-6" cy="-3" r="3.5" fill="#2c3e50"/>
    <circle cx="6" cy="-3" r="3.5" fill="#2c3e50"/>
    <circle cx="-5" cy="-4" r="1.2" fill="white"/>
    <circle cx="7" cy="-4" r="1.2" fill="white"/>
    <ellipse cx="-9" cy="4" rx="3.5" ry="2.5" fill="#FF8A80" opacity="0.7"/>
    <ellipse cx="9" cy="4" rx="3.5" ry="2.5" fill="#FF8A80" opacity="0.7"/>
    <path d="M -6 4 Q 0 11 6 4" stroke="#2c3e50" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- sparkles around the matched pair -->
  <g fill="#FFD600">
    <polygon points="120,72 122,77 127,77 123,80 125,85 120,82 115,85 117,80 113,77 118,77"/>
    <polygon points="265,70 267,76 273,76 268,80 270,86 265,82 260,86 262,80 257,76 263,76"/>
    <polygon points="195,165 197,170 202,170 198,173 200,178 195,175 190,178 192,173 188,170 193,170"/>
  </g>
  <g fill="white" opacity="0.95">
    <circle cx="80" cy="45" r="2.5"/>
    <circle cx="320" cy="60" r="2"/>
    <circle cx="55" cy="190" r="1.8"/>
  </g>
</svg>
