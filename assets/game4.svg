<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0288D1"/>
      <stop offset="60%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="cardback4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <radialGradient id="sun4" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFF59D"/>
      <stop offset="70%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
  </defs>
  <rect width="380" height="220" fill="url(#sky4)"/>
  <!-- cloud -->
  <g fill="white" opacity="0.78">
    <ellipse cx="320" cy="50" rx="26" ry="8"/>
    <circle cx="307" cy="45" r="10"/>
    <circle cx="322" cy="40" r="13"/>
    <circle cx="338" cy="45" r="10"/>
  </g>
  <!-- sun -->
  <circle cx="45" cy="42" r="22" fill="url(#sun4)" opacity="0.85"/>
  <!-- 4 cards fanned across -->
  <!-- card 4 (farthest, smallest, face-down) -->
  <g transform="translate(330, 130) rotate(22)" opacity="0.7">
    <rect x="-26" y="-38" width="52" height="76" rx="9" fill="url(#cardback4)" stroke="white" stroke-width="3"/>
    <rect x="-21" y="-33" width="42" height="66" rx="5" fill="none" stroke="white" stroke-width="1.3" stroke-dasharray="2 2" opacity="0.7"/>
    <text x="0" y="8" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="28" font-weight="900" fill="#3E2700">?</text>
  </g>
  <!-- card 1 (left, face-down, tilted left) -->
  <g transform="translate(95, 118) rotate(-12)">
    <rect x="-32" y="-46" width="64" height="92" rx="11" fill="url(#cardback4)" stroke="white" stroke-width="4"/>
    <rect x="-26" y="-40" width="52" height="80" rx="6" fill="none" stroke="white" stroke-width="1.6" stroke-dasharray="2.5 2.5" opacity="0.75"/>
    <text x="0" y="10" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="36" font-weight="900" fill="#3E2700">?</text>
  </g>
  <!-- card 3 (right, face-down, tilted right) -->
  <g transform="translate(255, 118) rotate(14)">
    <rect x="-32" y="-46" width="64" height="92" rx="11" fill="url(#cardback4)" stroke="white" stroke-width="4"/>
    <rect x="-26" y="-40" width="52" height="80" rx="6" fill="none" stroke="white" stroke-width="1.6" stroke-dasharray="2.5 2.5" opacity="0.75"/>
    <text x="0" y="10" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="36" font-weight="900" fill="#3E2700">?</text>
  </g>
  <!-- card 2 (center, face-up — match revealed) -->
  <g transform="translate(175, 112)">
    <rect x="-34" y="-50" width="68" height="100" rx="12" fill="white" stroke="#2DC572" stroke-width="4.5"/>
    <rect x="-28" y="-44" width="56" height="88" rx="6" fill="#E1F5FE"/>
    <!-- a red apple as the revealed match -->
    <circle cx="0" cy="6" r="20" fill="#FF5252" stroke="#B71C1C" stroke-width="2.5"/>
    <ellipse cx="-7" cy="-1" rx="5" ry="3.5" fill="#FFCDD2" opacity="0.75"/>
    <rect x="-2" y="-18" width="4" height="6" fill="#6D4C41" rx="1"/>
    <path d="M 2 -18 Q 10 -25 14 -19" stroke="#558B2F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- green match badge -->
    <circle cx="22" cy="-32" r="11" fill="#2DC572" stroke="white" stroke-width="2.5"/>
    <path d="M 17 -32 L 20 -28 L 27 -36" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- sparkles around the match -->
  <g fill="#FFD600">
    <polygon points="160,30 162,36 168,36 163,40 165,46 160,42 155,46 157,40 152,36 158,36"/>
    <polygon points="200,195 201,198 204,198 202,200 203,203 200,201 197,203 198,200 196,198 199,198"/>
  </g>
</svg>
