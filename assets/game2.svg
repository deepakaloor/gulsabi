<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="rainbow2" cx="0.45" cy="0.55" r="0.85">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="35%" stop-color="#FF9800"/>
      <stop offset="65%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </radialGradient>
    <radialGradient id="targetGlow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFEB3B" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFC107" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFC107" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- vibrant rainbow burst background -->
  <rect width="380" height="220" fill="url(#rainbow2)"/>

  <!-- radial sun rays toward target -->
  <g stroke="white" stroke-width="2" opacity="0.25" stroke-linecap="round">
    <line x1="280" y1="90" x2="350" y2="40"/>
    <line x1="280" y1="90" x2="370" y2="90"/>
    <line x1="280" y1="90" x2="350" y2="150"/>
    <line x1="280" y1="90" x2="200" y2="20"/>
    <line x1="280" y1="90" x2="200" y2="160"/>
  </g>

  <!-- target glow halo -->
  <circle cx="280" cy="90" r="55" fill="url(#targetGlow2)"/>

  <!-- target (red apple) -->
  <g transform="translate(280, 90)">
    <circle cx="0" cy="0" r="36" fill="none" stroke="white" stroke-width="2" stroke-dasharray="3 4" opacity="0.85"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <path d="M -22 -4 Q -24 -22 -8 -22 Q 0 -28 8 -22 Q 24 -22 22 -4 Q 24 18 8 22 Q 0 24 -8 22 Q -24 18 -22 -4 Z" fill="#F44336" stroke="#B71C1C" stroke-width="3"/>
    <path d="M 0 -28 Q 8 -36 16 -32 Q 14 -24 4 -22" fill="#4CAF50" stroke="#1B5E20" stroke-width="2"/>
    <ellipse cx="-8" cy="-8" rx="5" ry="8" fill="white" opacity="0.6"/>
  </g>

  <!-- cannonballs mid-air -->
  <g>
    <line x1="100" y1="165" x2="170" y2="125" stroke="#2196F3" stroke-width="3" stroke-linecap="round" opacity="0.55" stroke-dasharray="4 4"/>
    <circle cx="170" cy="125" r="9" fill="#2196F3" stroke="#0D47A1" stroke-width="2.5"/>
    <circle cx="167" cy="122" r="3" fill="white" opacity="0.6"/>

    <circle cx="160" cy="160" r="9" fill="#FDD835" stroke="#F57F17" stroke-width="2.5"/>
    <circle cx="157" cy="157" r="3" fill="white" opacity="0.6"/>
  </g>

  <!-- ground + cannon row -->
  <rect x="0" y="185" width="380" height="35" fill="#2c3e50"/>
  <rect x="0" y="183" width="380" height="3" fill="#FFD600"/>

  <g transform="translate(60, 178) rotate(-25)">
    <rect x="-4" y="-22" width="18" height="22" rx="3" fill="#F44336" stroke="#B71C1C" stroke-width="2.5"/>
    <circle cx="14" cy="-22" r="6" fill="#F44336" stroke="#B71C1C" stroke-width="2.5"/>
  </g>
  <circle cx="58" cy="197" r="9" fill="#B71C1C" stroke="#2c3e50" stroke-width="2"/>

  <g transform="translate(140, 178) rotate(-30)">
    <rect x="-4" y="-22" width="18" height="22" rx="3" fill="#2196F3" stroke="#0D47A1" stroke-width="2.5"/>
    <circle cx="14" cy="-22" r="6" fill="#2196F3" stroke="#0D47A1" stroke-width="2.5"/>
  </g>
  <circle cx="138" cy="197" r="9" fill="#0D47A1" stroke="#2c3e50" stroke-width="2"/>

  <g transform="translate(200, 178) rotate(-35)">
    <rect x="-4" y="-22" width="18" height="22" rx="3" fill="#FDD835" stroke="#F57F17" stroke-width="2.5"/>
    <circle cx="14" cy="-22" r="6" fill="#FDD835" stroke="#F57F17" stroke-width="2.5"/>
  </g>
  <circle cx="198" cy="197" r="9" fill="#F57F17" stroke="#2c3e50" stroke-width="2"/>

  <g transform="translate(265, 178) rotate(-45)">
    <rect x="-4" y="-22" width="18" height="22" rx="3" fill="#4CAF50" stroke="#1B5E20" stroke-width="2.5"/>
    <circle cx="14" cy="-22" r="6" fill="#4CAF50" stroke="#1B5E20" stroke-width="2.5"/>
  </g>
  <circle cx="263" cy="197" r="9" fill="#1B5E20" stroke="#2c3e50" stroke-width="2"/>

  <!-- Gulsabi cheering above cannons -->
  <g transform="translate(335, 168)">
    <circle cx="0" cy="0" r="17" fill="#FFD600" stroke="#2c3e50" stroke-width="2.5"/>
    <circle cx="-5" cy="-2" r="2.8" fill="#2c3e50"/>
    <circle cx="5" cy="-2" r="2.8" fill="#2c3e50"/>
    <ellipse cx="-7" cy="3" rx="3" ry="2" fill="#FF8A80" opacity="0.7"/>
    <ellipse cx="7" cy="3" rx="3" ry="2" fill="#FF8A80" opacity="0.7"/>
    <path d="M -5 3 Q 0 9 5 3" stroke="#2c3e50" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <line x1="-13" y1="-8" x2="-19" y2="-16" stroke="#2c3e50" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="13" y1="-8" x2="19" y2="-16" stroke="#2c3e50" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- sparkle accents -->
  <g fill="white" opacity="0.95">
    <polygon points="245,55 247,60 252,60 248,63 250,68 245,65 240,68 242,63 238,60 243,60"/>
    <polygon points="40,40 42,45 47,45 43,48 45,53 40,50 35,53 37,48 33,45 38,45"/>
  </g>
</svg>
